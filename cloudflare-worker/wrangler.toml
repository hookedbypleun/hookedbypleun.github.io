name = "crochet-by-pleun"
main = "worker.js"
compatibility_date = "2026-01-01"

# Secrets worden NIET hier gezet — gebruik:
#   wrangler secret put ADMIN_PASSWORD
#   wrangler secret put GEMINI_API_KEY      (primary AI)
#   wrangler secret put OPENROUTER_API_KEY  (fallback AI bij Gemini-quota)
#   wrangler secret put GITHUB_TOKEN
# Of via dashboard: Workers & Pages → crochet-by-pleun → Settings → Variables

# === Cloudflare Workers AI — laatste-redmiddel AI-fallback (gratis 10k neurons/dag) ===
[ai]
binding = "AI"

# === Stats KV — visitor-dedup + dag-aggregates (sinds v3.2.0) ===
[[kv_namespaces]]
binding = "STATS"
id = "57b9abd7aa0b4cd2b79ad69a6102eea3"

# === Stats D1 — events-history (sinds v3.5.0, 100k writes/dag) ===
[[d1_databases]]
binding = "DB"
database_name = "hooked-stats"
database_id = "5cfada4d-40d5-42c9-87ad-b400ae76bb6e"

# === Self-check cron (elke 15 min) — controleert of de site nog leeft ===
[triggers]
crons = ["*/15 * * * *"]
