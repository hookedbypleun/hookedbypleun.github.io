name = "crochet-by-pleun"
main = "worker.js"
compatibility_date = "2026-01-01"

# Secrets worden NIET hier gezet — gebruik:
#   wrangler secret put ADMIN_PASSWORD
#   wrangler secret put CLAUDE_API_KEY
#   wrangler secret put GITHUB_TOKEN
# Of via dashboard: Workers & Pages → crochet-by-pleun → Settings → Variables

# === Stats KV — privacy-first analytics (sinds v3.2.0) ===
# SETUP éénmalig (Dave):
#   1. wrangler login
#   2. npx wrangler kv namespace create STATS
#   3. Plak de id van de output hieronder en uncomment het blok
#   4. npx wrangler deploy
#
# Tot KV gebonden is werkt /track in-memory (verloren bij isolate-restart).
# [[kv_namespaces]]
# binding = "STATS"
# id = "PLAK_HIER_DE_ID"
